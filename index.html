<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sim-Vein — Simulador de Punção Venosa</title>
  <meta name="theme-color" content="#0d1b2a" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/public/imagens/logo-sim.png" />
  <link rel="apple-touch-icon" href="/public/imagens/logo-sim.png" />
  <!-- CSS EXTERNO (com cache-bust) -->
  <link rel="stylesheet" href="/styles.css?v=5" />
  <!-- CSS CRÍTICO EMBUTIDO (garante layout mesmo se o externo falhar) -->
  <style>
    :root{
      --bg:#f5f7f6; --surface:#ffffff; --ink:#0d1b2a; --muted:#5a6b7a;
      --accent:#1b998b; --accent2:#0d3b66;
      --good:#12b886; --warn:#f59f00; --danger:#e03131;
      --shadow:0 10px 28px rgba(0,0,0,.08); --r:16px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu}
    .topbar{display:flex;gap:12px;align-items:center;padding:10px 16px;background:var(--surface);box-shadow:var(--shadow);position:sticky;top:0;z-index:10}
    .logo{width:36px;height:36px}
    .btn{padding:10px 14px;border-radius:12px;border:0;background:var(--accent);color:#fff;cursor:pointer}
    .btn-alt{background:var(--accent2)} .btn-ghost{background:#e9eff4;color:#233}
    .layout{display:grid;grid-template-columns:320px 1fr 360px;gap:16px;padding:16px;align-items:start}
    .panel{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    select,input[type=range]{width:100%;padding:8px;border:1px solid #d9e0e8;border-radius:10px;background:#fff}
    .actions{display:flex;gap:8px;margin-top:10px}
    .canvasWrap{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:8px;display:grid;gap:8px;justify-items:center}
    #simCanvas{width:100%;height:auto;border-radius:12px;background:#fff}
    .hint{font-size:13px;color:var(--muted)}
    .report,.tutor{background:#fff;border:1px solid #e6edf4;border-radius:12px;padding:12px;min-height:80px}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px}
    .badge.good{background:rgba(18,184,134,.12);color:var(--good)}
    .badge.warn{background:rgba(245,144,0,.12);color:var(--warn)}
    .foot{padding:12px 16px;color:var(--muted);text-align:center}
    .foot-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
    .foot-logo{height:36px}.foot-logo-sm{height:28px;display:block;margin:0 auto 4px}
    @media (max-width:1024px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="topbar">
    <img src="/public/imagens/logo-sim.png" alt="Logo Sim-Vein" class="logo" />
    <h1>Sim-Vein — PWA de Punção Venosa</h1>
    <button id="installBtn" class="btn" hidden>Instalar</button>
  </header>

  <main class="layout">
    <section class="panel" aria-label="Configuração do caso">
      <h2>Caso</h2>
      <div class="grid">
        <label>Pele
          <select id="skinSel">
            <option value="1">Normal</option>
            <option value="1.2">Espessa</option>
            <option value="0.85">Fina</option>
          </select>
        </label>
        <label>Tônus venoso
          <select id="toneSel">
            <option value="1">Normal</option>
            <option value="0.8">Baixo</option>
            <option value="1.2">Alto</option>
          </select>
        </label>
        <label>Calibre do cateter
          <select id="gaugeSel">
            <option value="20">20G</option>
            <option value="18">18G</option>
            <option value="22">22G</option>
            <option value="24">24G</option>
          </select>
        </label>
        <label>Ângulo (°)
          <input type="range" id="angleRange" min="5" max="35" value="15" />
        </label>
      </div>
      <div class="actions">
        <button id="tourniquetBtn" class="btn">Aplicar Garrote</button>
        <button id="antisepsisBtn" class="btn btn-alt">Antissepsia</button>
        <button id="resetBtn" class="btn btn-ghost">Reiniciar</button>
      </div>
    </section>

    <section class="canvasWrap" aria-label="Simulação">
      <canvas id="simCanvas" width="880" height="420" aria-label="Braço virtual"></canvas>
      <div class="hint">Clique em uma veia para tentar a punção →</div>
    </section>

    <section class="panel" aria-label="Relatório e IA">
      <h2>Relatório & IA Tutor</h2>
      <div id="report" class="report"></div>
      <div id="tutor" class="tutor"></div>
    </section>
  </main>

  <footer class="foot">
    <div class="foot-wrap">
      <img src="/public/imagens/logo-instituto.png" alt="Logo Instituto" class="foot-logo" />
      <div class="foot-sign">
        <img src="/public/imagens/logo-harastech.png" alt="HarasTech" class="foot-logo-sm" />
        <small>
          Produto criado por HarasTech<br/>
          contato: <a href="mailto:harastech@outlook.com">harastech@outlook.com</a>
        </small>
      </div>
    </div>
  </footer>

  <script type="module" src="/app.js?v=5"></script>
  <!-- SW TEMPORARIAMENTE DESATIVADO PARA EVITAR CACHE ANTIGO
  <script> if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js'); } </script>
  -->
</body>
</html>
