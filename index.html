<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sim-Vein — Simulador de Punção Venosa</title>
  <meta name="theme-color" content="#0d1b2a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="public/imagens/logo-sim.png" />
  <link rel="apple-touch-icon" href="public/imagens/logo-sim.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <img src="public/imagens/logo-sim.png" alt="Logo Sim-Vein" class="logo" />
    <h1>Sim-Vein — PWA de Punção Venosa</h1>
    <button id="installBtn" hidden>Instalar</button>
  </header>

  <main class="layout">
    <!-- conteúdo omitido para brevidade, igual ao que já montamos -->
  </main>

  <footer class="foot">
    <div class="foot-wrap">
      <img src="public/imagens/logo-instituto.png" alt="Logo Instituto" class="foot-logo" />
      <div class="foot-sign">
        <img src="public/imagens/logo-harastech.png" alt="HarasTech" class="foot-logo-sm" />
        <small>Produto criado por HarasTech<br/>
          contato: <a href="mailto:harastech@outlook.com">harastech@outlook.com</a>
        </small>
      </div>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
